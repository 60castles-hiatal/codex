name: sync-upstream-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Upstream release tag to sync. Defaults to latest stable openai/codex release.
        required: false
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-release
  cancel-in-progress: false

jobs:
  prepare-release:
    if: github.repository == '60castles-hiatal/codex'
    runs-on: ubuntu-24.04
    outputs:
      sync_needed: ${{ steps.release.outputs.sync_needed }}
      upstream_release_tag: ${{ steps.release.outputs.upstream_release_tag }}
      fork_release_tag: ${{ steps.release.outputs.fork_release_tag }}
      state_file: ${{ steps.release.outputs.state_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "60castles-hiatal"
          git config user.email "290249417+60castles-hiatal@users.noreply.github.com"

      - name: Check latest upstream release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          state_file=".github/upstream-release-sync.txt"
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="$(gh release list \
              --repo openai/codex \
              --exclude-drafts \
              --exclude-pre-releases \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')"
          fi

          case "${RELEASE_TAG}" in
            rust-v*) ;;
            *)
              echo "Unexpected upstream release tag: ${RELEASE_TAG}" >&2
              exit 1
              ;;
          esac

          version="${RELEASE_TAG#rust-v}"
          fork_release_tag="rust-v${version}-60castles.1"
          synced_tag="$(cat "${state_file}" 2>/dev/null || true)"
          if [ "${RELEASE_TAG}" = "${synced_tag}" ]; then
            sync_needed=false
          else
            sync_needed=true
          fi

          {
            echo "sync_needed=${sync_needed}"
            echo "upstream_release_tag=${RELEASE_TAG}"
            echo "fork_release_tag=${fork_release_tag}"
            echo "state_file=${state_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Create patched fork release
        if: steps.release.outputs.sync_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_RELEASE_TAG: ${{ steps.release.outputs.upstream_release_tag }}
          FORK_RELEASE_TAG: ${{ steps.release.outputs.fork_release_tag }}
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/openai/codex.git
          git fetch upstream "refs/tags/${UPSTREAM_RELEASE_TAG}:refs/tags/${UPSTREAM_RELEASE_TAG}"

          if git ls-remote --exit-code --tags origin "refs/tags/${FORK_RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Fork release tag ${FORK_RELEASE_TAG} already exists; reusing it."
          else
            git checkout -B "release/${FORK_RELEASE_TAG}" origin/main

            # Snapshot the upstream release without pushing upstream workflow history.
            git rm -r --ignore-unmatch . >/dev/null
            git checkout "${UPSTREAM_RELEASE_TAG}" -- .
            # The default Actions token cannot create or update workflow files.
            # Keep this fork's workflows on release branches; builds run from main.
            rm -rf .github/workflows
            git checkout origin/main -- .github/workflows

            internal_context="codex-rs/core/src/context/internal_model_context.rs"
            event_mapping="codex-rs/core/src/event_mapping.rs"

            perl -0pi -e 's/(impl ContextualUserFragment for InternalModelContextFragment \{\n    fn role\([^)]*\) -> [^\n]+\n        )"user"/\1"developer"/' "${internal_context}"

            if ! grep -q '"<codex_internal_context"' "${event_mapping}"; then
              perl -0pi -e 's/(const CONTEXTUAL_DEVELOPER_PREFIXES: &\[&str\] = &?\[\n)/\1    "<codex_internal_context",\n/' "${event_mapping}"
            fi

            if ! grep -A8 'impl ContextualUserFragment for InternalModelContextFragment' "${internal_context}" | grep -q '"developer"'; then
              echo "Failed to apply developer-role goal context patch." >&2
              exit 1
            fi
            if ! grep -q '"<codex_internal_context"' "${event_mapping}"; then
              echo "Failed to apply contextual developer-prefix patch." >&2
              exit 1
            fi
            goal_spec="codex-rs/ext/goal/src/spec.rs"
            goal_continuation="codex-rs/ext/goal/templates/goals/continuation.md"
            app_server_lib="codex-rs/app-server/src/lib.rs"
            if ! grep -q '^#!\[recursion_limit = "' "${app_server_lib}"; then
              perl -0pi -e 's/\A/#![recursion_limit = "256"]\n/' "${app_server_lib}"
            fi
            perl -0pi -e 's/vec!\[json!\("complete"\), json!\("blocked"\)\]/vec![json!("complete")]/' "${goal_spec}"
            perl -0pi -e 's/Required\. Set to \x60complete\x60 only when the objective is achieved and no required work remains\. Set to \x60blocked\x60.*?fresh blocked audit\./Required. Set to \x60complete\x60 only when the objective is achieved and no required work remains./s' "${goal_spec}"
            perl -0pi -e 's/Use this tool only to mark the goal achieved or genuinely blocked\./Use this tool only to mark the goal achieved./' "${goal_spec}"
            perl -0pi -e 's/\nSet status to \x60blocked\x60.*?Do not use \x60blocked\x60 merely because.*?\n/\n/s' "${goal_spec}"
            perl -0pi -e 's/Blocked audit:\n.*?Do not call update_goal unless the goal is complete or the strict blocked audit above is satisfied\. Do not mark a goal complete merely because the budget is nearly exhausted or because you are stopping work\./Keep-going policy:\n- Do not call update_goal with status "blocked".\n- If work is blocked by missing input, unavailable external state, failing infrastructure, uncertainty, or repeated errors, leave the goal active and keep looking for useful progress.\n- Do not mark a goal complete merely because progress is currently blocked, the budget is nearly exhausted, or because you are stopping work.\n\nDo not call update_goal unless the goal is complete./s' "${goal_continuation}"
            if grep -q 'json!("blocked")\|status to .*blocked\|Blocked audit:' "${goal_spec}" "${goal_continuation}"; then
              echo "Failed to apply keep-going goal instructions." >&2
              exit 1
            fi
            if ! git diff --quiet HEAD -- .github/workflows; then
              echo "Release snapshot unexpectedly changed workflow files." >&2
              exit 1
            fi
            if git diff --quiet HEAD; then
              echo "Patch made no changes." >&2
              exit 1
            fi

            git add -A
            git commit -m "Build patched ${UPSTREAM_RELEASE_TAG}"
            git tag -a "${FORK_RELEASE_TAG}" -m "Release ${FORK_RELEASE_TAG}"
            git push origin "HEAD:refs/heads/release/${FORK_RELEASE_TAG}" "refs/tags/${FORK_RELEASE_TAG}"
          fi

          if gh release view "${FORK_RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${FORK_RELEASE_TAG} already exists; reusing it."
          else
            version="${FORK_RELEASE_TAG#rust-v}"
            gh release create "${FORK_RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${version}" \
              --notes "" \
              --latest
          fi

  build-linux-binaries:
    needs: prepare-release
    if: needs.prepare-release.outputs.sync_needed == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-release-binaries.yml
    with:
      release_tag: ${{ needs.prepare-release.outputs.fork_release_tag }}

  finalise-sync:
    needs:
      - prepare-release
      - build-linux-binaries
    if: needs.prepare-release.outputs.sync_needed == 'true' && needs.build-linux-binaries.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "60castles-hiatal"
          git config user.email "290249417+60castles-hiatal@users.noreply.github.com"

      - name: Merge upstream main and record synced release
        env:
          UPSTREAM_RELEASE_TAG: ${{ needs.prepare-release.outputs.upstream_release_tag }}
          STATE_FILE: ${{ needs.prepare-release.outputs.state_file }}
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/openai/codex.git
          git fetch upstream main
          git rm -r --ignore-unmatch . >/dev/null
          git checkout upstream/main -- .
          # Avoid pushing upstream workflow changes or history with the default Actions token.
          rm -rf .github/workflows
          git checkout HEAD -- .github/workflows

          internal_context="codex-rs/core/src/context/internal_model_context.rs"
          event_mapping="codex-rs/core/src/event_mapping.rs"

          perl -0pi -e 's/(impl ContextualUserFragment for InternalModelContextFragment \{\n    fn role\([^)]*\) -> [^\n]+\n        )"user"/\1"developer"/' "${internal_context}"

          if ! grep -q '"<codex_internal_context"' "${event_mapping}"; then
            perl -0pi -e 's/(const CONTEXTUAL_DEVELOPER_PREFIXES: &\[&str\] = &?\[\n)/\1    "<codex_internal_context",\n/' "${event_mapping}"
          fi

          if ! grep -A8 'impl ContextualUserFragment for InternalModelContextFragment' "${internal_context}" | grep -q '"developer"'; then
            echo "Failed to apply developer-role goal context patch." >&2
            exit 1
          fi
          if ! grep -q '"<codex_internal_context"' "${event_mapping}"; then
            echo "Failed to apply contextual developer-prefix patch." >&2
            exit 1
          fi
          goal_spec="codex-rs/ext/goal/src/spec.rs"
          goal_continuation="codex-rs/ext/goal/templates/goals/continuation.md"
          app_server_lib="codex-rs/app-server/src/lib.rs"
          if ! grep -q '^#!\[recursion_limit = "' "${app_server_lib}"; then
            perl -0pi -e 's/\A/#![recursion_limit = "256"]\n/' "${app_server_lib}"
          fi
          perl -0pi -e 's/vec!\[json!\("complete"\), json!\("blocked"\)\]/vec![json!("complete")]/' "${goal_spec}"
          perl -0pi -e 's/Required\. Set to \x60complete\x60 only when the objective is achieved and no required work remains\. Set to \x60blocked\x60.*?fresh blocked audit\./Required. Set to \x60complete\x60 only when the objective is achieved and no required work remains./s' "${goal_spec}"
          perl -0pi -e 's/Use this tool only to mark the goal achieved or genuinely blocked\./Use this tool only to mark the goal achieved./' "${goal_spec}"
          perl -0pi -e 's/\nSet status to \x60blocked\x60.*?Do not use \x60blocked\x60 merely because.*?\n/\n/s' "${goal_spec}"
          perl -0pi -e 's/Blocked audit:\n.*?Do not call update_goal unless the goal is complete or the strict blocked audit above is satisfied\. Do not mark a goal complete merely because the budget is nearly exhausted or because you are stopping work\./Keep-going policy:\n- Do not call update_goal with status "blocked".\n- If work is blocked by missing input, unavailable external state, failing infrastructure, uncertainty, or repeated errors, leave the goal active and keep looking for useful progress.\n- Do not mark a goal complete merely because progress is currently blocked, the budget is nearly exhausted, or because you are stopping work.\n\nDo not call update_goal unless the goal is complete./s' "${goal_continuation}"
          if grep -q 'json!("blocked")\|status to .*blocked\|Blocked audit:' "${goal_spec}" "${goal_continuation}"; then
            echo "Failed to apply keep-going goal instructions." >&2
            exit 1
          fi
          if ! git diff --quiet HEAD -- .github/workflows; then
            echo "Sync snapshot unexpectedly changed workflow files." >&2
            exit 1
          fi

          printf "%s\n" "${UPSTREAM_RELEASE_TAG}" > "${STATE_FILE}"
          git add -A
          git commit -m "Sync openai/codex for ${UPSTREAM_RELEASE_TAG}"

      - name: Push updates
        run: git push origin "HEAD:${GITHUB_REF_NAME}"
